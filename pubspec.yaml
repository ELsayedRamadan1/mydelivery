name: deliswift
description: A modern delivery app built with Flutter & Clean Architecture
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5

  # Navigation
  go_router: ^17.1.0

  # Dependency Injection
  get_it: ^9.2.1

  # Network
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  # Firebase
  firebase_core:
  firebase_auth:
  cloud_firestore:
  firebase_storage:
  firebase_messaging:
  flutter_local_notifications:

  # Models / Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # Maps
  google_maps_flutter: ^2.5.3

  # UI & Animations
  lottie: ^3.0.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  gap: ^3.0.1

  # Local Storage
  shared_preferences: ^2.2.2
  hive_flutter: ^1.1.0

  # Utils
  intl: ^0.20.2
  dartz: ^0.10.1
  connectivity_plus: ^7.0.0
  image_picker: ^1.0.7
  permission_handler: ^12.0.1
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1
  bloc_test: ^10.0.0
  mocktail: ^1.0.3
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FFFFFF"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
